services:
  traefik:
    image: traefik:v3.6.11
    container_name: traefik
    command:
      - "--providers.docker=true"
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"      # tráfico HTTP
      - "8080:8080"  # dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - plataforma-net
  backend:
    build: ./backend
    environment:
      - FLASK_APP=app.py
      - FLASK_RUN_PORT=8000
      - FLASK_RUN_HOST=0.0.0.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - plataforma-net

  frontend:
    build: ./frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"  
    networks:
      - plataforma-net
    volumes:
      - ./frontend:/usr/share/nginx/html

networks:
  plataforma-net:
    name: plataforma-net
    driver: bridge